name: Deploy production

on:
  push:
    tags:
      - "release/*"

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Shared tests
        run: |
          npm ci --prefix shared
          npm run --prefix shared build
          npm test --prefix shared

      - name: Backend tests
        run: |
          npm ci --prefix idle-backend
          npm test --prefix idle-backend

      - name: Frontend checks
        run: |
          npm ci --prefix idle-react
          npm run --prefix idle-react lint
          npm test --prefix idle-react
          npm run --prefix idle-react build

  build_and_push:
    runs-on: ubuntu-latest
    needs: test
    env:
      BACKEND_IMAGE_REPO: ${{ secrets.PROD_BACKEND_IMAGE_REPO }}
      FRONTEND_IMAGE_REPO: ${{ secrets.PROD_FRONTEND_IMAGE_REPO }}
      VITE_API_BASE_URL: ${{ secrets.PROD_API_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set IMAGE_TAG for registry (Docker tags cannot contain '/')
        run: |
          tag="${GITHUB_REF_NAME}"
          echo "IMAGE_TAG=${tag//\//-}" >> "${GITHUB_ENV}"

      - name: Validate required secrets
        run: |
          test -n "${BACKEND_IMAGE_REPO}" || (echo "Missing secret: PROD_BACKEND_IMAGE_REPO" && exit 1)
          test -n "${FRONTEND_IMAGE_REPO}" || (echo "Missing secret: PROD_FRONTEND_IMAGE_REPO" && exit 1)
          test -n "${VITE_API_BASE_URL}" || (echo "Missing secret: PROD_API_BASE_URL" && exit 1)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: idle-backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE_REPO }}:${{ env.IMAGE_TAG }}
            ${{ env.BACKEND_IMAGE_REPO }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: idle-react/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }}
          tags: |
            ${{ env.FRONTEND_IMAGE_REPO }}:${{ env.IMAGE_TAG }}
            ${{ env.FRONTEND_IMAGE_REPO }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    env:
      BACKEND_IMAGE_REPO: ${{ secrets.PROD_BACKEND_IMAGE_REPO }}
      FRONTEND_IMAGE_REPO: ${{ secrets.PROD_FRONTEND_IMAGE_REPO }}
      GHCR_USERNAME: ${{ secrets.PROD_GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.PROD_GHCR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set IMAGE_TAG for registry (Docker tags cannot contain '/')
        run: |
          tag="${GITHUB_REF_NAME}"
          echo "IMAGE_TAG=${tag//\//-}" >> "${GITHUB_ENV}"

      - name: Validate server secrets
        run: |
          test -n "${{ secrets.PROD_SERVER_HOST }}" || (echo "Missing secret: PROD_SERVER_HOST" && exit 1)
          test -n "${{ secrets.PROD_SERVER_USER }}" || (echo "Missing secret: PROD_SERVER_USER" && exit 1)
          test -n "${{ secrets.PROD_SERVER_SSH_KEY }}" || (echo "Missing secret: PROD_SERVER_SSH_KEY" && exit 1)

      - name: Copy deploy bundle to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          source: "deploy/compose.production.yml,deploy/Caddyfile,deploy/.env.production.example,deploy/scripts/*"
          target: "/opt/maxidle"
          overwrite: true
          strip_components: 1

      - name: Deploy tag on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          script_stop: true
          envs: IMAGE_TAG,BACKEND_IMAGE_REPO,FRONTEND_IMAGE_REPO,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -euo pipefail
            mkdir -p /opt/maxidle/deploy/scripts
            cp -f /opt/maxidle/scripts/*.sh /opt/maxidle/deploy/scripts/
            cp -f /opt/maxidle/compose.production.yml /opt/maxidle/deploy/compose.production.yml
            cp -f /opt/maxidle/Caddyfile /opt/maxidle/deploy/Caddyfile
            if [ ! -f /opt/maxidle/deploy/.env.production ]; then
              cp /opt/maxidle/.env.production.example /opt/maxidle/deploy/.env.production
              echo "Created /opt/maxidle/deploy/.env.production from example."
              echo "Fill real values then re-run deploy."
              exit 1
            fi
            chmod +x /opt/maxidle/deploy/scripts/*.sh
            /opt/maxidle/deploy/scripts/deploy-release.sh
