services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - max_idle_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  migrate:
    image: ${BACKEND_IMAGE_REPO}:${IMAGE_TAG:-latest}
    restart: "no"
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    command: ["node", "dist/scripts/migrate.js"]
    networks:
      - internal

  backend:
    image: ${BACKEND_IMAGE_REPO}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - internal
      - edge

  frontend:
    image: ${FRONTEND_IMAGE_REPO}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - edge

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - edge

volumes:
  max_idle_pg_data:
  caddy_data:
  caddy_config:

networks:
  internal:
  edge:
