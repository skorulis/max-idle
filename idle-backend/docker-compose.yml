version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: max-idle-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: max_idle
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - max_idle_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d max_idle"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  max_idle_pg_data:
